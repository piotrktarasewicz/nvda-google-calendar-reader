<!doctype html>
<html lang="pl">
<head>
<meta charset="utf-8">
<title>Dyżury</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{font-family:sans-serif;padding:1rem;}
.card{border:1px solid #ccc;padding:1rem;border-radius:1rem;}
button,select,a{width:100%;margin-top:0.5rem;padding:0.7rem;}
</style>
</head>
<body>

<div class="card">
<h1>Wybór dnia</h1>
<p id="status">Wczytywanie…</p>

<select id="sel"></select>
<button id="btn">Pokaż</button>

<div id="err"></div>
</div>

<script>
function normalizeDate(v){
  const r=String(v||"").trim();
  if(!r)return null;
  if(/^\d{4}-\d{2}-\d{2}$/.test(r))return r;

  let m=r.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if(m)return `${m[3]}-${m[2].padStart(2,"0")}-${m[1].padStart(2,"0")}`;

  m=r.match(/^(\d{1,2})-(\d{1,2})-(\d{4})$/);
  if(m)return `${m[3]}-${m[2].padStart(2,"0")}-${m[1].padStart(2,"0")}`;

  return null;
}

function normalizeTime(v){
  const r=String(v||"").trim();
  if(!r)return "";
  return r.replace(".",":");
}

function today(){
  const d=new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}

function friendly(d){
  const [y,m,da]=d.split("-").map(Number);
  return new Intl.DateTimeFormat("pl-PL",{weekday:"long",day:"numeric",month:"long",year:"numeric"})
    .format(new Date(y,m-1,da));
}

function split(l){return l.includes(";")?l.split(";"):l.split(",");}

function parse(text){
  const lines=text.split(/\r?\n/).map(x=>x.trim()).filter(Boolean);
  if(lines.length<2)return [];

  const header=split(lines[0]);
  const row=split(lines[1]);

  const out=[];
  for(let i=0;i<header.length;i++){
    const d=normalizeDate(header[i]);
    if(!d)continue;

    const s=(row[i]||"").toLowerCase().trim();
    const e=(row[i+1]||"").toLowerCase().trim();

    if(!s||s==="off"||s==="v")continue;

    out.push({date:d,start:normalizeTime(s),end:normalizeTime(e)});
  }
  return out;
}

const status=document.getElementById("status");
const sel=document.getElementById("sel");
const btn=document.getElementById("btn");
const err=document.getElementById("err");

btn.onclick=()=>{
  if(!sel.value)return err.textContent="Wybierz dzień";
  location.href="results.html?day="+encodeURIComponent(sel.value);
};

fetch("grafik.csv",{cache:"no-store"})
.then(r=>{
  if(!r.ok)throw new Error("Błąd wczytywania grafiku");
  return r.text();
})
.then(text=>{
  const rows=parse(text);
  const t=today();

  const dates=[...new Set(rows.map(r=>r.date).filter(d=>d>=t))].sort();

  if(!dates.length){
    err.textContent="Brak dyżurów";
    status.textContent="";
    return;
  }

  dates.forEach(d=>{
    const o=document.createElement("option");
    o.value=d;
    o.textContent=friendly(d);
    sel.appendChild(o);
  });

  status.textContent="Grafik wczytany.";
})
.catch(e=>{
  status.textContent="";
  err.textContent=e.message;
});
</script>

</body>
</html>
