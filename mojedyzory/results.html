<!doctype html>
<html lang="pl">
<head>
<meta charset="utf-8">
<title>Wyniki</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{font-family:sans-serif;padding:1rem;}
.card{border:1px solid #ccc;padding:1rem;border-radius:1rem;}
.duty{border:1px solid #ccc;margin-top:0.5rem;padding:0.5rem;}
a{display:block;margin-top:1rem;}
</style>
</head>
<body>

<div class="card">
<h1>Wyniki</h1>
<p id="status">Wczytywanie…</p>

<div id="list"></div>

<a href="index.html">Wróć do wyboru dnia</a>

<div id="err"></div>
</div>

<script>
function normalizeDate(v){
  const r=String(v||"").trim();
  if(!r)return null;
  if(/^\d{4}-\d{2}-\d{2}$/.test(r))return r;

  let m=r.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if(m)return `${m[3]}-${m[2].padStart(2,"0")}-${m[1].padStart(2,"0")}`;

  m=r.match(/^(\d{1,2})-(\d{1,2})-(\d{4})$/);
  if(m)return `${m[3]}-${m[2].padStart(2,"0")}-${m[1].padStart(2,"0")}`;

  return null;
}

function normalizeTime(v){
  return String(v||"").replace(".",":");
}

function today(){
  const d=new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}

function split(l){return l.includes(";")?l.split(";"):l.split(",");}

function parse(text){
  const lines=text.split(/\r?\n/).map(x=>x.trim()).filter(Boolean);
  if(lines.length<2)return [];

  const header=split(lines[0]);
  const row=split(lines[1]);

  const out=[];
  for(let i=0;i<header.length;i++){
    const d=normalizeDate(header[i]);
    if(!d)continue;

    const s=(row[i]||"").toLowerCase().trim();
    const e=(row[i+1]||"").toLowerCase().trim();

    if(!s||s==="off"||s==="v")continue;

    out.push({date:d,start:normalizeTime(s),end:normalizeTime(e)});
  }
  return out;
}

const params=new URLSearchParams(location.search);
const day=params.get("day");

const status=document.getElementById("status");
const list=document.getElementById("list");
const err=document.getElementById("err");

if(!day){
  err.textContent="Brak dnia";
}else{
  fetch("grafik.csv",{cache:"no-store"})
  .then(r=>{
    if(!r.ok)throw new Error("Błąd wczytywania grafiku");
    return r.text();
  })
  .then(text=>{
    const rows=parse(text);

    if(day<today()){
      err.textContent="Nie można cofnąć";
      status.textContent="";
      return;
    }

    const d=rows.filter(r=>r.date===day);

    status.textContent="Grafik wczytany.";

    if(!d.length){
      list.textContent="Brak dyżuru";
      return;
    }

    list.innerHTML=d.map(x=>`<div class="duty">${x.start}–${x.end}</div>`).join("");
  })
  .catch(e=>{
    status.textContent="";
    err.textContent=e.message;
  });
}
</script>

</body>
</html>
